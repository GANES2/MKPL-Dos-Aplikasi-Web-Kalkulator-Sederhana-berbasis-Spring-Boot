name: Full CI/CD Pipeline

# 1. Trigger (Kapan pipeline dijalankan)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_test_deploy:
    # 2. Menyiapkan Mesin Virtual (Runner)
    runs-on: ubuntu-latest

    steps:
    # 3. Mengambil Kode (Checkout)
    - name: Checkout Code
      uses: actions/checkout@v4

    # 4. Menyiapkan Environment Java (JDK 17)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # ANGGOTA 1 (ZHAFIR): Continuous Integration
    - name: 1. Continuous Integration (Compile Code)
      run: mvn clean compile

    # ANGGOTA 2 (GANES): Continuous Testing
    - name: 2. Continuous Testing (Run Unit Tests)
      run: mvn test

    # ANGGOTA 3 (MARVEL): Continuous Inspection
    - name: 3. Continuous Inspection (Code Quality via Checkstyle)
      run: mvn checkstyle:check

    # ANGGOTA 4 (ABI): Continuous Delivery
    - name: 4a. Continuous Delivery (Package JAR)
      run: mvn package -DskipTests

    - name: 4b. Continuous Delivery (Upload Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: photobooth-app-ready
        path: target/*.jar

    # ANGGOTA 5 (AJI): Continuous Deployment
    - name: 5. Continuous Deployment (Mock Deploy to Server)
      run: |
        echo "================================================="
        echo "🚀 MEMULAI PROSES DEPLOYMENT KE SERVER PRODUCTION"
        echo "================================================="
        echo "1. Menghubungkan ke server Ubuntu via SSH..."
        echo "2. Mengirim file photobooth-app-ready.jar..."
        echo "3. Me-restart layanan (systemctl restart photobooth)..."
        echo "✅ DEPLOYMENT BERHASIL! Aplikasi sudah online."
        echo "================================================="
